name: IPL ticket watcher

on:
  schedule:
    # Runs every 5 minutes (GHA cron minimum). The job itself polls N times at
    # a configurable interval to cover the gap between scheduled invocations.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      page_url:
        description: Page to poll (leave blank for default SRH team page)
        required: false
        default: ''
      match_anchor:
        description: Match title to locate (leave blank to scan all cards)
        required: false
        default: ''
      ntfy_topic:
        description: Override ntfy topic (leave blank to use default vk18mgrx7)
        required: false
        default: ''
      dry_run:
        description: Dry run (skip actually sending the ntfy push)
        required: false
        type: boolean
        default: false
      poll_count:
        description: How many polls to run in this invocation
        required: false
        default: '5'
      poll_interval:
        description: Seconds between polls
        required: false
        default: '70'

concurrency:
  group: watcher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    # Must be >= (poll_count - 1) * poll_interval / 60 (plus a minute for checkout/setup).
    # Default schedule: 5 polls × 70s = 4m40s wall time → 8 min gives headroom.
    # Manual runs with higher values can bump this via workflow edits if needed.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Poll loop
        env:
          NTFY_TOPIC: ${{ inputs.ntfy_topic != '' && inputs.ntfy_topic || 'vk18mgrx7' }}
          PAGE_URL: ${{ inputs.page_url }}
          MATCH_ANCHOR: ${{ inputs.match_anchor }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          POLL_COUNT: ${{ inputs.poll_count || '5' }}
          POLL_INTERVAL: ${{ inputs.poll_interval || '70' }}
          STATE_FILE: .state/watcher.state
        run: |
          set -u
          mkdir -p .state
          count="${POLL_COUNT:-5}"
          interval="${POLL_INTERVAL:-70}"
          echo "running $count polls at ${interval}s spacing"
          for i in $(seq 1 "$count"); do
            echo "::group::poll $i/$count"
            python3 check.py || echo "poll $i exited non-zero (non-fatal)"
            echo "::endgroup::"
            if [ "$i" -lt "$count" ]; then
              sleep "$interval"
            fi
          done

      - name: Persist state if changed
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -n "$(git status --porcelain .state/ 2>/dev/null)" ]; then
            git config user.name  "ipl-ticket-alerts-bot"
            git config user.email "ipl-ticket-alerts-bot@users.noreply.github.com"
            git add .state/
            git commit -m "chore: update watcher state [skip ci]"
            # Retry-safe push: rebase on top of any concurrent state commit
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "push failed, attempt $attempt — rebasing and retrying"
              git pull --rebase
            done
            echo "push failed after retries" >&2
            exit 1
          else
            echo "no state change"
          fi
